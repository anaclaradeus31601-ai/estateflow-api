services:
  db:
    image: postgres:16-alpine
    container_name: estateflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-estateflow}
      POSTGRES_USER: ${POSTGRES_USER:-estateuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estate123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estateuser} -d ${POSTGRES_DB:-estateflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estateflow-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-estateuser}:${POSTGRES_PASSWORD:-estate123}@db:5432/${POSTGRES_DB:-estateflow}?schema=public
      PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  uploads_data:
